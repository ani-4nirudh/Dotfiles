# Marine Dark Theme
# Source https//github.com/ProDeSquare/alacritty-colorschemes/blob/master/themes/marine_dark.yaml

# Primary colors
[colors.primary]
background = '#002221'
foreground = '#ffc09f'

# Normal colors
[colors.normal]
black   = '#002221'
red     = '#ea3431'
green   = '#00b6b6'
yellow  = '#f8b017'
blue    = '#4894fd'
magenta = '#e01dca'
cyan    = '#1ab2ad'
white   = '#99dddb'

# Bright colors
[colors.bright]
black   = '#006562'
red     = '#ea3431'
green   = '#00b6b6'
yellow  = '#f8b017'
blue    = '#4894fd'
magenta = '#e01dca'
cyan    = '#1ab2ad'
white   = '#e6f6f6'

# Dim colors (for inactive text)
[colors.dim]
black   = '#001110'
red     = '#a52320'
green   = '#008080'
yellow  = '#b07810'
blue    = '#3570b0'
magenta = '#a01490'
cyan    = '#127f7b'
white   = '#6a9999'

# Cursor colors
[colors.cursor]
text = '#002221'
cursor = '#00b6b6'

# Vi mode cursor colors
[colors.vi_mode_cursor]
text = '#002221'
cursor = '#f8b017'

# Selection colors
[colors.selection]
text = 'CellForeground'
background = '#006562'

# Search colors
[colors.search.matches]
foreground = '#002221'
background = '#f8b017'

[colors.search.focused_match]
foreground = '#002221'
background = '#ea3431'

# Hints colors (for URLs and file paths)
[colors.hints.start]
foreground = '#002221'
background = '#f8b017'

[colors.hints.end]
foreground = '#002221'
background = '#1ab2ad'

# Line indicator (vi mode)
[colors.line_indicator]
foreground = 'None'
background = 'None'

# Footer bar (search mode)
[colors.footer_bar]
foreground = '#002221'
background = '#99dddb'
